<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>钱包总览 — SupClaw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              ui:     ['"PingFang SC"', '"HarmonyOS Sans SC"', '"Noto Sans SC"', "system-ui", "sans-serif"],
              num:    ['"Open Sans"', "ui-sans-serif", "system-ui", "sans-serif"],
              slogan: ['"PingFang SC"', '"HarmonyOS Sans SC"', '"Noto Sans SC"', "system-ui", "sans-serif"],
            },
            colors: {
              tokenText:         "var(--color-text-primary)",
              tokenSub:          "var(--color-text-secondary)",
              tokenHint:         "var(--color-text-hint)",
              tokenPrimary:      "var(--color-primary)",
              tokenPrimaryDark:  "var(--color-primary-dark)",
              tokenPage:         "var(--color-bg-page)",
              tokenCard:         "var(--color-bg-card)",
              tokenBorder:       "var(--color-border)",
              tokenBorderSubtle: "var(--color-border-subtle)",
              tokenSuccess:      "var(--color-success)",
              tokenDanger:       "var(--color-danger)",
            },
          },
        },
      };
    </script>
    <style>
      :root {
        /* Text */
        --color-text-primary:   #0d1527;
        --color-text-secondary: #6b788e;
        --color-text-hint:      #93a7cb;

        /* Brand primary — green/teal */
        --color-primary:        #14c7b5;
        --color-primary-dark:   #0e9e8e;
        --color-primary-soft:   #edfaf8;
        --color-primary-border: #c2ede7;

        /* Semantic */
        --color-success:      #13a978;
        --color-success-soft: #edfaf8;
        --color-danger:       #e8425a;
        --color-danger-soft:  #fff1f3;

        /* Surface */
        --color-bg-page:       #f7fbff;
        --color-bg-card:       #ffffff;
        --color-border:        #e6ecf3;
        --color-border-subtle: #f0f4f8;

        /* ABC token palettes */
        --token-a-from:   #ffd33c;
        --token-a-to:     #ffad00;
        --token-a-soft:   #fffaf1;
        --token-a-border: #f2e4cc;
        --token-a-text:   #cc8800;

        --token-b-from:   #42a6ff;
        --token-b-to:     #2468ea;
        --token-b-soft:   #f6fbff;
        --token-b-border: #dae7f8;
        --token-b-text:   #2378ee;

        --token-c-from:   #18d1bd;
        --token-c-to:     #09afa4;
        --token-c-soft:   #effffc;
        --token-c-border: #d5f0eb;
        --token-c-text:   #10aa9f;

        /* Elevation (3 levels) */
        --shadow-sm: 0 4px 12px rgba(13, 21, 39, 0.06);
        --shadow-md: 0 8px 20px rgba(13, 21, 39, 0.08);
        --shadow-lg: 0 12px 32px rgba(13, 21, 39, 0.10);

        /* Radius (3 levels) */
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-width: 375px;
        background: var(--color-bg-page);
      }

      .no-scrollbar { scrollbar-width: none; }
      .no-scrollbar::-webkit-scrollbar { display: none; }

      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .enter { animation: fadeSlideUp 360ms cubic-bezier(0.22, 1, 0.36, 1) both; }

      @keyframes tabEnter {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .tab-enter { animation: tabEnter 120ms cubic-bezier(0.22, 1, 0.36, 1) both; }

      @keyframes nudge {
        0%,100% { transform: translateX(0); }
        25%      { transform: translateX(-3px); }
        75%      { transform: translateX(3px); }
      }
      .nudge { animation: nudge 400ms ease-in-out 650ms both; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
      window.react = window.React;
    </script>
    <script crossorigin src="https://unpkg.com/lucide-react@0.468.0/dist/umd/lucide-react.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="env,react">
      const {
        ArrowDownLeft,
        ArrowLeftRight,
        ArrowUpRight,
        ChevronRight,
        Info,
        History,
        Home,
        MoreHorizontal,
        PlayCircle,
        PlusCircle,
        ReceiptText,
        ShoppingCart,
        Wallet,
      } = window.LucideReact;

      const ABC_BALANCES = [
        { key: "A", v: "a", label: "ASC",  value: "5.20", price: "5 亿/个" },
        { key: "B", v: "b", label: "BSC",  value: "3.00", price: "3 亿/个" },
        { key: "C", v: "c", label: "CSC",  value: "1.80", price: "1 亿/个" },
      ];

      const SC_FLOWS = [
        { dir: "in",  label: "补贴到账", sub: "本轮补贴 3.11 亿（补贴 +3.7%）", amount: "+3.11 亿 SC", time: "今天 16:40" },
        { dir: "in",  label: "兑换 SC",  sub: "10 DOS → 10 亿 SC",              amount: "+10 亿 SC",   time: "今天 14:23" },
        { dir: "in",  label: "补贴到账", sub: "本轮折让 36%（折让）",            amount: "+5.20 亿 SC", time: "昨天 20:08" },
      ];

      const ORDERS = [
        { combo: "A×1  B×1  C×1", amount: "−9 亿 SC",  time: "今天 16:42" },
        { combo: "A×2  B×1",      amount: "−13 亿 SC", time: "昨天 20:11" },
      ];

      const PURCHASE_ACTIONS = [
        {
          Icon: ArrowLeftRight,
          label: "兑换首发权",
          sub: "A / B / C 可混合购买，一次结算",
          iconBg: "var(--color-primary-soft)",
          iconColor: "text-tokenPrimary",
        },
      ];

      function SloganBanner({ lang, setLang }) {
        return (
          <section
            className="mb-[22px] relative -mt-[24px] -mx-4 px-5 pt-[46px] pb-3 overflow-visible"
            style={{ background: "linear-gradient(180deg, #e2f8f5 0%, #f7fbff 100%)" }}
          >
            <div className="pr-[128px]">
              <p className="font-slogan text-[19px] font-extrabold leading-[26px] text-tokenText">
                抢占视频首发权
              </p>
              <p className="font-slogan text-[19px] font-extrabold leading-[26px] text-tokenPrimary">
                解锁万亿词元补贴
              </p>
            </div>
            <img
              src="assets/image.png"
              alt="抢占视频首发权"
              className="absolute right-[20px] top-[11px] h-[140px] w-[150px] object-contain object-bottom"
            />
            <button
              onClick={() => setLang(l => l === "zh" ? "en" : "zh")}
              className="absolute right-5 top-[32px] rounded-[4px] px-1.5 py-0.5 text-[12px] font-semibold leading-none"
              style={{
                color: "var(--color-text-secondary)",
                border: "1px solid color-mix(in srgb, var(--color-border) 62%, transparent)",
              }}
            >
              {lang === "zh" ? "EN" : "中"}
            </button>
          </section>
        );
      }

      function SCHeroCard() {
        return (
          <section
            className="relative overflow-hidden px-4 pb-3 pt-3"
            style={{
              borderRadius: "var(--radius-lg)",
              background: "var(--color-bg-card)",
              boxShadow: "0 4px 16px rgba(13, 21, 39, 0.08)",
            }}
          >
            <div
              className="absolute -right-6 top-11 h-[90px] w-[110px] rounded-full blur-[20px] opacity-35"
              style={{ background: "var(--color-primary-soft)" }}
            />
            <img src="assets/sc-hero-illustration.png" className="absolute -right-7 -top-2.5 h-[180px] w-[180px] object-contain opacity-40" alt="" />

            <div className="relative">
              <div className="mb-2.5 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <Wallet className="h-[17px] w-[17px] text-tokenPrimary" strokeWidth={2} />
                  <span className="text-[17px] font-semibold leading-[22px] text-tokenText">词元余额 (SC)</span>
                  <Info className="h-[13px] w-[13px] text-tokenHint" strokeWidth={1.8} />
                </div>
                <button
                  className="flex items-center gap-1.5 px-4 py-2 text-[13px] font-semibold text-white"
                  style={{ borderRadius: "var(--radius-md)", background: "var(--color-primary)", boxShadow: "0 2px 8px color-mix(in srgb, var(--color-primary) 40%, transparent)" }}
                >
                  <ArrowLeftRight className="h-[14px] w-[14px]" strokeWidth={2.5} />
                  兑换 SC
                </button>
              </div>

              <div className="flex items-end gap-1.5 text-tokenText">
                <span className="font-num text-[34px] font-semibold leading-none tracking-[-1px]">
                  {(() => {
                    const target = 32.11;
                    const [val, setVal] = React.useState(0);
                    React.useEffect(() => {
                      const dur = 300, start = performance.now();
                      const raf = (now) => {
                        const t = Math.min((now - start) / dur, 1);
                        const ease = 1 - Math.pow(1 - t, 3);
                        setVal(ease * target);
                        if (t < 1) requestAnimationFrame(raf);
                      };
                      requestAnimationFrame(raf);
                    }, []);
                    return val.toFixed(2);
                  })()}
                </span>
                <span className="pb-1 text-[16px] font-medium">亿</span>
              </div>
            </div>
          </section>
        );
      }

      function ABCCard() {
        return (
          <section
            className="mt-3 overflow-hidden"
            style={{
              borderRadius: "var(--radius-lg)",
              background: "var(--color-bg-card)",
              boxShadow: "var(--shadow-md)",
            }}
          >
            {/* card header */}
            <div className="relative flex items-center gap-2 px-4 pt-3.5 pb-2.5 overflow-hidden">
              <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
                <defs>
                  <linearGradient id="hxGrad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stopColor="#18d8c4"/>
                    <stop offset="100%" stopColor="#0e9e8e"/>
                  </linearGradient>
                </defs>
                <path d="M9 1.5 L16 5.25 L16 12.75 L9 16.5 L2 12.75 L2 5.25 Z" fill="none" stroke="url(#hxGrad)" strokeWidth="1.5"/>
                <polygon points="9,5.2 10.1,7.7 12.8,8 10.9,9.8 11.4,12.5 9,11.2 6.6,12.5 7.1,9.8 5.2,8 7.9,7.7" fill="url(#hxGrad)"/>
              </svg>
              <span className="text-[17px] font-semibold leading-[22px] text-tokenText">我的首发权</span>
            </div>
            <div className="h-px bg-tokenBorderSubtle" />

            {/* balance grid — gap-px trick gives hairline dividers */}
            <div className="grid grid-cols-3 gap-px" style={{ background: "var(--color-border-subtle)" }}>
              {ABC_BALANCES.map((item) => (
                <div
                  key={item.key}
                  className="px-3 py-3"
                  style={{ background: "var(--color-bg-card)" }}
                >
                  <div className="mb-2 flex items-center gap-1.5">
                    <div
                      className="grid h-7 w-[25px] shrink-0 place-items-center font-num text-[14px] font-bold text-white"
                      style={{
                        background: "linear-gradient(135deg, var(--token-" + item.v + "-from), var(--token-" + item.v + "-to))",
                        clipPath: "polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)",
                      }}
                    >
                      {item.key}
                    </div>
                    <span
                      className="text-[12px] font-semibold leading-[16px]"
                      style={{ color: "var(--token-" + item.v + "-text)" }}
                    >
                      {item.label}
                    </span>
                    <Info className="h-[11px] w-[11px] text-tokenHint opacity-60" strokeWidth={1.8} />
                  </div>
                  <p
                    className="mb-2 truncate text-[10px] leading-[14px] opacity-75"
                    style={{ color: "var(--token-" + item.v + "-text)" }}
                  >
                    {item.sub}
                  </p>
                  <p className="mb-0.5 text-[10px] leading-[13px] text-tokenHint">数量</p>
                  <div className="flex items-end gap-0.5 text-tokenText">
                    <span className="font-num text-[20px] font-semibold leading-none">{item.value}</span>
                  </div>
                </div>
              ))}
            </div>

            {/* CTA — independent button with card padding */}
            <div className="bg-tokenCard px-3 pb-3 pt-2.5">
              <button
                className="relative w-full overflow-hidden flex items-center gap-3 px-4 py-2.5 text-left"
                style={{
                  borderRadius: "var(--radius-md)",
                  background: "linear-gradient(135deg, #17d4bf 0%, #0eb5a6 55%, #0a9090 100%)",
                  boxShadow: "0 4px 14px rgba(14,185,166,0.35)",
                }}
              >
                <div
                  className="pointer-events-none absolute -right-4 -top-4 h-20 w-20 rounded-full opacity-20"
                  style={{ background: "radial-gradient(circle, #ffffff 0%, transparent 70%)" }}
                />
                <div
                  className="relative grid h-9 w-9 shrink-0 place-items-center"
                  style={{ borderRadius: "var(--radius-sm)", background: "rgba(255,255,255,0.22)" }}
                >
                  <ArrowLeftRight className="nudge h-[18px] w-[18px] text-white" strokeWidth={2.2} />
                </div>
                <div className="relative min-w-0 flex-1">
                  <p className="text-[15px] font-bold leading-[20px] text-white">兑换首发权</p>
                </div>
                <ChevronRight className="relative h-[17px] w-[17px] shrink-0 text-white/70" strokeWidth={2.2} />
              </button>
            </div>
          </section>
        );
      }

      function WalletHistory() {
        const [tab, setTab] = React.useState("sc");

        const TABS = [
          { key: "sc",    label: "收支明细" },
          { key: "order", label: "兑换记录" },
        ];

        return (
          <section className="mt-6">
            {/* header row */}
            <div className="mb-3 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <History className="h-[17px] w-[17px] text-tokenPrimary" strokeWidth={2} />
                <h2 className="text-[17px] font-semibold leading-[22px] text-tokenText">历史记录</h2>
              </div>
              <button className="flex items-center gap-0.5 text-[13px] leading-[17px] text-tokenSub">
                更多
                <ChevronRight className="h-[15px] w-[15px]" />
              </button>
            </div>

            {/* tab bar */}
            <div className="mb-3 flex border-b border-tokenBorderSubtle">
              {TABS.map((t) => (
                <button
                  key={t.key}
                  onClick={() => setTab(t.key)}
                  className="mr-5 pb-2 text-[14px] font-semibold leading-[20px] transition-colors"
                  style={{
                    color: tab === t.key ? "var(--color-primary)" : "var(--color-text-secondary)",
                    borderBottom: tab === t.key ? "2px solid var(--color-primary)" : "2px solid transparent",
                    marginBottom: "-1px",
                  }}
                >
                  {t.label}
                </button>
              ))}
            </div>

            {/* SC 收支 list */}
            {tab === "sc" && (
              <div
                key="sc"
                className="tab-enter overflow-hidden bg-tokenCard"
                style={{ borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-md)" }}
              >
                {SC_FLOWS.slice(0, 3).map((item, i) => (
                  <div
                    key={i}
                    className={"flex items-center gap-3 px-4 py-3" + (i < 2 ? " border-b border-tokenBorderSubtle" : "")}
                  >
                    <div
                      className="grid h-9 w-9 shrink-0 place-items-center rounded-full"
                      style={{ background: "var(--color-success-soft)" }}
                    >
                      <ArrowDownLeft className="h-[18px] w-[18px] text-tokenSuccess" strokeWidth={2.2} />
                    </div>
                    <div className="min-w-0 flex-1">
                      <p className="truncate text-[14px] font-medium leading-[18px] text-tokenText">{item.label}</p>
                      <p className="mt-0.5 truncate text-[12px] leading-[16px] text-tokenSub">{item.sub}</p>
                    </div>
                    <div className="shrink-0 text-right">
                      <p className="font-num text-[15px] font-semibold leading-[20px] text-tokenSuccess">{item.amount}</p>
                      <p className="mt-0.5 text-[11px] leading-[15px] text-tokenHint">{item.time}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* 首发权订单 list */}
            {tab === "order" && (
              <div
                key="order"
                className="tab-enter overflow-hidden bg-tokenCard"
                style={{ borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-md)" }}
              >
                {ORDERS.map((item, i) => (
                  <div
                    key={i}
                    className={"flex items-center gap-3 px-4 py-3" + (i < ORDERS.length - 1 ? " border-b border-tokenBorderSubtle" : "")}
                  >
                    <div
                      className="grid h-9 w-9 shrink-0 place-items-center rounded-full"
                      style={{ background: "var(--color-danger-soft)" }}
                    >
                      <ShoppingCart className="h-[18px] w-[18px] text-tokenDanger" strokeWidth={2} />
                    </div>
                    <div className="min-w-0 flex-1">
                      <p className="truncate text-[14px] font-medium leading-[18px] text-tokenText">{item.combo}</p>
                      <p className="mt-0.5 truncate text-[12px] leading-[16px] text-tokenSub">首发权</p>
                    </div>
                    <div className="shrink-0 text-right">
                      <p className="font-num text-[15px] font-semibold leading-[20px] text-tokenDanger">{item.amount}</p>
                      <p className="mt-0.5 text-[11px] leading-[15px] text-tokenHint">{item.time}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </section>
        );
      }

      const VIDEO_PRODUCTS = [
        { id: 1, title: "星空延时·极光版", tag: "4K",  dur: "30s", price: "1.5 亿", grad: "linear-gradient(135deg,#1a1a4e,#3b2d8a,#6c3fa0)" },
        { id: 2, title: "海浪慢镜·日落", tag: "HD",  dur: "15s", price: "0.8 亿", grad: "linear-gradient(135deg,#0d4f7c,#1a8fa8,#43c6b0)" },
        { id: 3, title: "城市航拍·霓虹夜", tag: "4K",  dur: "60s", price: "3 亿",   grad: "linear-gradient(135deg,#1a0533,#7b1fa2,#e040fb)" },
        { id: 4, title: "樱花飘落·慢镜",  tag: "HD",  dur: "20s", price: "1 亿",   grad: "linear-gradient(135deg,#4a0010,#c2185b,#f48fb1)" },
      ];

      const { Clapperboard } = window.LucideReact;

      function AIVideoMallPreview() {
        return (
          <section className="mt-6">
            <div className="mb-3 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <PlayCircle className="h-[17px] w-[17px] text-tokenPrimary" strokeWidth={2} />
                <h2 className="text-[17px] font-semibold leading-[22px] text-tokenText">AI 生成</h2>
              </div>
              <button className="flex items-center gap-0.5 text-[13px] leading-[17px] text-tokenSub">
                进入
                <ChevronRight className="h-[15px] w-[15px]" />
              </button>
            </div>

            {/* horizontal scroll cards */}
            <div className="no-scrollbar -mx-4 flex gap-3 overflow-x-auto px-4 pb-1">
              {VIDEO_PRODUCTS.map((p) => (
                <button
                  key={p.id}
                  className="relative shrink-0 overflow-hidden text-left"
                  style={{ width: 140, borderRadius: "var(--radius-md)", boxShadow: "var(--shadow-md)" }}
                >
                  {/* thumbnail */}
                  <div
                    className="relative h-[88px] w-full"
                    style={{ background: p.grad }}
                  >
                    {/* play icon overlay */}
                    <div className="absolute inset-0 flex items-center justify-center">
                      <div
                        className="grid h-8 w-8 place-items-center rounded-full"
                        style={{ background: "rgba(255,255,255,0.22)", backdropFilter: "blur(4px)" }}
                      >
                        <svg viewBox="0 0 24 24" className="h-4 w-4 text-white" fill="currentColor">
                          <polygon points="5,3 19,12 5,21" />
                        </svg>
                      </div>
                    </div>
                    {/* 4K / HD tag */}
                    <span
                      className="absolute left-2 top-2 rounded px-1.5 py-0.5 font-num text-[10px] font-bold text-white"
                      style={{ background: "rgba(0,0,0,0.38)" }}
                    >
                      {p.tag}
                    </span>
                    {/* duration */}
                    <span
                      className="absolute bottom-2 right-2 font-num text-[10px] text-white/80"
                    >
                      {p.dur}
                    </span>
                  </div>

                  {/* info */}
                  <div
                    className="bg-tokenCard px-2.5 py-2"
                  >
                    <p className="truncate text-[12px] font-medium leading-[16px] text-tokenText">{p.title}</p>
                    <p className="mt-1 font-num text-[13px] font-semibold leading-[17px] text-tokenPrimary">{p.price} SC</p>
                  </div>
                </button>
              ))}

              {/* "查看全部" tail card */}
              <button
                className="flex shrink-0 flex-col items-center justify-center gap-1.5 bg-tokenCard text-tokenSub"
                style={{ width: 72, borderRadius: "var(--radius-md)", boxShadow: "var(--shadow-sm)" }}
              >
                <div
                  className="grid h-9 w-9 place-items-center rounded-full"
                  style={{ background: "var(--color-primary-soft)" }}
                >
                  <ChevronRight className="h-4 w-4 text-tokenPrimary" strokeWidth={2.4} />
                </div>
                <span className="text-[11px] leading-[14px]">更多</span>
              </button>
            </div>
          </section>
        );
      }

      const NAV_ICONS_FILLED = {
        "首页": () => (
          <svg viewBox="0 0 24 24" className="h-[22px] w-[22px]" fill="currentColor">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
        ),
        "AI 生成": () => (
          <svg viewBox="0 0 24 24" className="h-[22px] w-[22px]" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
          </svg>
        ),
        "订单": () => (
          <svg viewBox="0 0 24 24" className="h-[22px] w-[22px]" fill="currentColor">
